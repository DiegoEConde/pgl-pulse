<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="180" viewBox="0 0 900 180">
  <defs>
    <linearGradient id="pulseBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1F9BFF"/>
      <stop offset="100%" stop-color="#006BFF"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Toggle -->
  <g transform="translate(8,52)">
    <rect x="0" y="0" rx="36" ry="36" width="165" height="72" fill="#0E739A"/>
    <circle cx="125" cy="36" r="27" fill="#FFFFFF" stroke="#D7D7D7" stroke-width="2"/>
  </g>

  <!-- PGL -->
  <text x="48" y="128"
        fill="#FFFFFF"
        font-size="128"
        font-weight="900"
        font-family="Arial, Helvetica, sans-serif"
        letter-spacing="-5">PGL</text>

  <!-- Pulse -->
  <text x="450" y="118"
        fill="url(#pulseBlue)"
        font-size="82"
        font-style="italic"
        font-weight="700"
        font-family="Arial, Helvetica, sans-serif"
        filter="url(#glow)">Pulse</text>

  <!-- ECG -->
  <path d="M706 98
           L738 98
           L753 66
           L769 144
           L785 88
           L798 98
           L850 98"
        fill="none"
        stroke="url(#pulseBlue)"
        stroke-width="6"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#glow)"/>
</svg>
